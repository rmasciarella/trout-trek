<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDEBE6"/>
      <stop offset="100%" style="stop-color:#FAF8F3"/>
    </linearGradient>
    <linearGradient id="bm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B9E7C"/>
      <stop offset="40%" style="stop-color:#A3B18A"/>
      <stop offset="70%" style="stop-color:#C2C9A7"/>
      <stop offset="100%" style="stop-color:#E8DABB"/>
    </linearGradient>
    <linearGradient id="bt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B7F5E"/>
      <stop offset="50%" style="stop-color:#7A8E6C"/>
      <stop offset="100%" style="stop-color:#8B9E7C"/>
    </linearGradient>
    <linearGradient id="tf" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8B9E7C;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#9E8B6E;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="bl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4C9A8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#E8DABB;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="ff" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9E8B6E;stop-opacity:0.65"/>
      <stop offset="100%" style="stop-color:#B5A48A;stop-opacity:0.45"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle diagonal lines pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#5C6B4E" stroke-width="1"/>
    <line x1="100" y1="0" x2="1200" y2="578" stroke="#5C6B4E" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="525" stroke="#5C6B4E" stroke-width="1"/>
    <line x1="300" y1="0" x2="1200" y2="473" stroke="#5C6B4E" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="420" stroke="#5C6B4E" stroke-width="1"/>
    <line x1="500" y1="0" x2="1200" y2="368" stroke="#5C6B4E" stroke-width="1"/>
    <line x1="600" y1="0" x2="1200" y2="315" stroke="#5C6B4E" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="630" stroke="#5C6B4E" stroke-width="1"/>
    <line x1="0" y1="200" x2="1100" y2="630" stroke="#5C6B4E" stroke-width="1"/>
    <line x1="0" y1="300" x2="1000" y2="630" stroke="#5C6B4E" stroke-width="1"/>
  </g>

  <!-- Fish - centered and scaled up -->
  <g transform="translate(200, 120) scale(1.4)">
    <!-- Tail fins -->
    <path d="M 72 108 Q 48 85 22 52 Q 38 72 48 88 Q 30 58 12 28 Q 35 65 52 95" fill="url(#tf)" stroke="#5C6B4E" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <path d="M 72 128 Q 48 150 22 182 Q 38 162 48 148 Q 30 175 12 205 Q 35 170 52 142" fill="url(#tf)" stroke="#5C6B4E" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <!-- Body -->
    <path d="M 70 115 C 95 108,130 82,180 68 C 220 58,270 48,320 44 C 370 40,420 42,460 50 C 490 56,510 65,530 80 C 542 90,548 100,550 112 L 548 118 C 546 130,540 140,530 148 C 515 162,495 170,470 176 C 430 186,380 190,330 190 C 270 190,210 185,165 175 C 130 167,100 155,80 142 C 72 136,70 125,70 120 Z" fill="url(#bm)" stroke="#5C6B4E" stroke-width="2" stroke-linejoin="round"/>
    <!-- Top -->
    <path d="M 70 115 C 95 108,130 82,180 68 C 220 58,270 48,320 44 C 370 40,420 42,460 50 C 490 56,510 65,530 80 C 542 90,548 100,550 112 L 548 114 C 500 100,440 82,370 76 C 300 70,220 78,160 92 C 120 102,90 112,70 118 Z" fill="url(#bt)" opacity="0.6"/>
    <!-- Belly -->
    <path d="M 100 155 C 140 170,200 180,280 185 C 340 188,400 186,450 178 C 470 174,490 168,505 160 C 490 172,460 182,430 188 C 380 196,310 198,250 194 C 190 189,140 178,105 162 Z" fill="url(#bl)" opacity="0.6"/>
    <!-- Dorsal fin -->
    <path d="M 280 50 Q 295 18 310 8 Q 318 12 322 22 Q 332 10 342 8 Q 348 14 350 24 Q 358 16 365 18 Q 362 32 358 46 Q 330 38 300 42 Z" fill="url(#ff)" stroke="#6B7F5E" stroke-width="1.4" stroke-linejoin="round" opacity="0.8"/>
    <!-- Vermiculation -->
    <path d="M 180 72 Q 186 66 192 72 Q 198 78 204 72" fill="none" stroke="#4A5A3C" stroke-width="1.4" opacity="0.35"/>
    <path d="M 220 64 Q 226 58 232 64 Q 238 70 244 64" fill="none" stroke="#4A5A3C" stroke-width="1.4" opacity="0.35"/>
    <path d="M 260 58 Q 266 52 272 58 Q 278 64 284 58" fill="none" stroke="#4A5A3C" stroke-width="1.4" opacity="0.3"/>
    <!-- Halos + Red spots -->
    <circle cx="200" cy="115" r="5.5" fill="#7A9AAE" opacity="0.2"/>
    <circle cx="250" cy="105" r="5.5" fill="#7A9AAE" opacity="0.2"/>
    <circle cx="300" cy="110" r="5.5" fill="#7A9AAE" opacity="0.2"/>
    <circle cx="350" cy="100" r="5.5" fill="#7A9AAE" opacity="0.2"/>
    <circle cx="400" cy="105" r="5" fill="#7A9AAE" opacity="0.18"/>
    <circle cx="280" cy="135" r="5.5" fill="#7A9AAE" opacity="0.2"/>
    <circle cx="340" cy="130" r="5" fill="#7A9AAE" opacity="0.18"/>
    <circle cx="200" cy="115" r="3.5" fill="#C4704B" opacity="0.7"/><circle cx="200" cy="115" r="2" fill="#D4856A" opacity="0.9"/>
    <circle cx="250" cy="105" r="3.5" fill="#C4704B" opacity="0.7"/><circle cx="250" cy="105" r="2" fill="#D4856A" opacity="0.9"/>
    <circle cx="300" cy="110" r="3.5" fill="#C4704B" opacity="0.7"/><circle cx="300" cy="110" r="2" fill="#D4856A" opacity="0.9"/>
    <circle cx="350" cy="100" r="3.5" fill="#C4704B" opacity="0.68"/><circle cx="350" cy="100" r="2" fill="#D4856A" opacity="0.88"/>
    <circle cx="400" cy="105" r="3" fill="#C4704B" opacity="0.65"/><circle cx="400" cy="105" r="1.8" fill="#D4856A" opacity="0.85"/>
    <circle cx="280" cy="135" r="3.5" fill="#C4704B" opacity="0.68"/><circle cx="280" cy="135" r="2" fill="#D4856A" opacity="0.88"/>
    <circle cx="340" cy="130" r="3" fill="#C4704B" opacity="0.65"/><circle cx="340" cy="130" r="1.8" fill="#D4856A" opacity="0.85"/>
    <!-- Gill -->
    <path d="M 490 82 Q 495 105 492 135" fill="none" stroke="#5C6B4E" stroke-width="1.8" opacity="0.45" stroke-linecap="round"/>
    <!-- Eye -->
    <circle cx="520" cy="100" r="7.5" fill="#2D3424"/><circle cx="520" cy="100" r="5" fill="#3D4A30"/><circle cx="522" cy="98" r="2" fill="#E8DABB" opacity="0.75"/>
    <!-- Mouth -->
    <path d="M 548 118 Q 555 114 558 108" fill="none" stroke="#5C6B4E" stroke-width="2" stroke-linecap="round"/>
    <path d="M 548 112 Q 554 110 558 108" fill="none" stroke="#5C6B4E" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Accent line under fish -->
  <path d="M 300 430 Q 600 450 900 430" fill="none" stroke="#8B9E7C" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Decorative dots -->
  <circle cx="380" cy="520" r="3" fill="#C4704B" opacity="0.3"/>
  <circle cx="600" cy="530" r="4" fill="#8B9E7C" opacity="0.2"/>
  <circle cx="820" cy="520" r="3" fill="#C4704B" opacity="0.3"/>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#C2C9A7" stroke-width="1" opacity="0.3" rx="4"/>
</svg>

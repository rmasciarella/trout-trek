<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&display=swap');
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #EDEBE6, #FAF8F3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
    position: relative;
  }
  .pattern {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      -45deg, transparent, transparent 8px,
      rgba(139, 158, 124, 0.06) 8px, rgba(139, 158, 124, 0.06) 9px
    );
  }
  .border {
    position: absolute;
    top: 20px; left: 20px; right: 20px; bottom: 20px;
    border: 1px solid rgba(194, 201, 167, 0.3);
    border-radius: 4px;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .fish { margin-bottom: 24px; }
  .brand {
    font-family: 'Dancing Script', cursive;
    font-size: 72px;
    font-weight: 600;
    color: #5C6B4E;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-style: italic;
    color: #8B9E7C;
    letter-spacing: 6px;
  }
  .location {
    margin-top: 16px;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #A3B18A;
  }
</style>
</head>

    <style type="text/tailwindcss">
      @theme {
        --color-forest: #5C6B4E;
        --color-forest-deep: #3D4A30;
        --color-sage: #8B9E7C;
        --color-moss: #A3B18A;
        --color-lichen: #C2C9A7;
        --color-sand: #D4C9A8;
        --color-cream: #E8DABB;
        --color-parchment: #FAF8F3;
        --color-warm-white: #EDEBE6;
        --color-copper: #C4704B;
        --color-copper-light: #D4856A;
        --color-stream: #7A9AAE;
        --color-driftwood: #9E8B6E;
        --font-display: 'Cormorant Garamond', 'Georgia', serif;
        --font-script: 'Dancing Script', cursive;
        --font-body: 'Outfit', system-ui, sans-serif;
      }

      html { scroll-behavior: smooth; font-size: 20px; }

      body {
        font-family: var(--font-body);
        background: var(--color-warm-white);
        color: var(--color-forest-deep);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      ::selection { background: var(--color-sage); color: white; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes drift {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(1deg); }
      }

      .animate-fade-up { animation: fadeUp 0.8s ease-out forwards; opacity: 0; }
      .animate-fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
      .animate-drift { animation: drift 6s ease-in-out infinite; }

      .delay-100 { animation-delay: 0.1s; }
      .delay-200 { animation-delay: 0.2s; }
      .delay-300 { animation-delay: 0.3s; }
      .delay-400 { animation-delay: 0.4s; }
      .delay-500 { animation-delay: 0.5s; }
      .delay-600 { animation-delay: 0.6s; }
      .delay-700 { animation-delay: 0.7s; }
      .delay-800 { animation-delay: 0.8s; }

      .grain::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        z-index: 9999;
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--color-warm-white); }
      ::-webkit-scrollbar-thumb { background: var(--color-sage); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-forest); }

      .rod-card {
        transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .rod-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 24px 48px -12px rgba(61, 74, 48, 0.15);
      }

      .nav-blur {
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
      }

      .pattern-lines {
        background-image: repeating-linear-gradient(
          -45deg, transparent, transparent 8px,
          rgba(139, 158, 124, 0.06) 8px, rgba(139, 158, 124, 0.06) 9px
        );
      }
    </style>

  <body class="grain">

  </body>
